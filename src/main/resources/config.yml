# YSMSync Configuration

# YSM protocol channel
channel: "yes_steve_model:2_6_0"

# Protocol version sent during handshake
protocol-version: "2.6.0"

# Brand identifier
brand: "open_ysm:v1"

# Whether to allow model upload from clients
allow-upload: false

# Upload settings
upload:
  # Maximum upload file size in bytes (default: 10MB)
  max-size: 10485760
  # Chunk size in bytes sent per request (default: 32KB, matching Fox Model Loader)
  chunk-size: 32000
  # Maximum chunks allowed per tick
  chunks-per-tick: 4

# Debug logging
debug: false

# Check for updates on startup
check-update: true

# Auto-download and apply updates (requires server restart)
# When true, the plugin will automatically download the latest JAR when an update is detected.
# After download, restart the server to apply the update.
auto-update: false
