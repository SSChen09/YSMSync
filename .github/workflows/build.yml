name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "^version" build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Check if version already released
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG is new, will build."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.check.outputs.skip == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        if: steps.check.outputs.skip == 'false'
        run: chmod +x gradlew

      - name: Build with Gradle
        if: steps.check.outputs.skip == 'false'
        run: ./gradlew shadowJar

      - name: Upload artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: YSMSync-${{ steps.version.outputs.version }}
          path: build/libs/*.jar

      - name: Create Release
        if: steps.check.outputs.skip == 'false' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          MESSAGE=$(git log -1 --pretty=format:'%s')
          gh release create "$TAG" build/libs/*.jar \
            --title "$TAG" \
            --notes "$MESSAGE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
