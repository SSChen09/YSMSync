name: 功能建议
description: 为 YSMSync 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的想法，帮助我们更好地理解需求。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 你遇到了什么问题，或者有什么需求无法被现有功能满足
      placeholder: 例如：目前模型上传只能通过客户端发起，我希望管理员也能通过命令行批量导入模型
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 你希望如何实现这个功能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于理解此建议的信息（截图、参考项目等）
    validations:
      required: false
